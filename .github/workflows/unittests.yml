name: Unit Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Scraper (To generate data for tests)
        run: python scripts/scraper.py # Make sure this path is correct
      - name: Run Tests
        run: pytest tests/
